<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-BUDDY Navigation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/core@latest/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/bluetooth-le@latest/dist/index.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #0a0a12;
            color: #00ffcc;
        }
        .crt-glow {
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }
        .panel-border {
            border: 2px solid #00ffcc;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.2), 0 0 10px rgba(0, 255, 204, 0.2);
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between">

    <header class="panel-border bg-[#121225] p-3 rounded-lg flex items-center justify-between mb-4">
        <div>
            <h1 class="text-xl font-bold tracking-wider crt-glow">M-BUDDY LINK</h1>
            <div class="flex items-center gap-2 mt-1">
                <span id="pingDot" class="w-3 h-3 bg-red-500 rounded-full border border-black"></span>
                <span id="connectionState" class="text-xs text-gray-400">DISCONNECTED</span>
            </div>
        </div>
        <button id="connectBtn" onclick="toggleConnection()" class="bg-[#00ffcc] text-black font-bold px-4 py-2 rounded border border-black hover:bg-black hover:text-[#00ffcc] transition-all duration-200">
            CONNECT
        </button>
    </header>

    <main class="flex-grow space-y-4">
        
        <section class="panel-border bg-[#121225] p-4 rounded-lg space-y-2">
            <h2 class="text-xs text-gray-400 tracking-widest uppercase border-b border-[#00ffcc]/30 pb-1">Live Environment Broadcast</h2>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div>Time: <span id="lblTime" class="text-white">--:--</span></div>
                <div>Loc: <span id="lblLoc" class="text-white">Detecting...</span></div>
                <div class="col-span-2">Weather: <span id="lblWeather" class="text-white">Awaiting GPS Lock...</span></div>
            </div>
        </section>

        <section class="panel-border bg-[#121225] p-4 rounded-lg space-y-3">
            <h2 class="text-xs text-gray-400 tracking-widest uppercase border-b border-[#00ffcc]/30 pb-1">Matrix Text Push</h2>
            <div class="flex gap-2">
                <input type="text" id="txtCustom" placeholder="Enter message..." max="32" class="flex-grow bg-black border border-[#00ffcc] text-white p-2 rounded text-sm focus:outline-none focus:ring-1 focus:ring-[#00ffcc]">
                <button onclick="pushCustomText()" class="bg-[#00ffcc]/20 border border-[#00ffcc] text-[#00ffcc] px-4 py-2 text-sm rounded font-bold hover:bg-[#00ffcc] hover:text-black transition-all">
                    SEND
                </button>
            </div>
        </section>

        <section class="panel-border bg-[#121225] p-4 rounded-lg space-y-3">
            <h2 class="text-xs text-gray-400 tracking-widest uppercase border-b border-[#00ffcc]/30 pb-1">Action Engine Overrides</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="triggerMood('HAPPY')" class="bg-green-900/40 border border-green-400 text-green-400 py-3 rounded font-bold active:scale-95 transition-all">😊 HAPPY</button>
                <button onclick="triggerMood('ANGRY')" class="bg-red-900/40 border border-red-400 text-red-400 py-3 rounded font-bold active:scale-95 transition-all">😡 ANGRY</button>
                <button onclick="triggerMood('WEE')" class="bg-blue-900/40 border border-blue-400 text-blue-400 py-3 rounded font-bold active:scale-95 transition-all">😮 SURPRISED</button>
                <button onclick="triggerMood('SHIVER')" class="bg-purple-900/40 border border-purple-400 text-purple-400 py-3 rounded font-bold active:scale-95 transition-all">🌀 DIZZY</button>
            </div>
        </section>
    </main>

    <footer class="mt-4 text-center text-[10px] text-gray-600 tracking-widest uppercase">
        M-Buddy Companion Platform &bull; Core Engine v1.0.10
    </footer>

    <script>
        const { BleClient } = CapacitorStringify || window.CapacitorCustomBLE || {};
        
        // Match UUID variables explicitly defined in your ESP32 M_BUDDY013 setup
        const TARGET_SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const TARGET_CHAR_UUID    = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const SECURITY_PASSCODE   = "1234";

        let connectedTargetDevice = null;
        let transmissionIntervalTimer = null;
        let currentCustomTextPayload = "None";

        // Global telemetry values 
        let geoTime = "--:--";
        let geoLoc = "Unknown";
        let geoWeather = "Clear";

        // DOM elements references
        const connectBtn = document.getElementById("connectBtn");
        const connectionState = document.getElementById("connectionState");
        const pingDot = document.getElementById("pingDot");

        // Native lifecycle boot initializer
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                if (window.Capacitor && typeof BleClient !== 'undefined') {
                    await BleClient.initialize();
                    console.log("[SYSTEM]: Capacitor BLE stack initialized safely.");
                }
                initTelemetryMocks();
            } catch (err) {
                console.error("BLE Runtime Error at init:", err);
            }
        });

        // Initialize fake/mock sensor metrics updates to show data on UI panels
        function initTelemetryMocks() {
            setInterval(() => {
                const now = new Date();
                geoTime = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                document.getElementById("lblTime").textContent = geoTime;
            }, 1000);
            
            geoLoc = "New York";
            geoWeather = "72°F Sunny";
            document.getElementById("lblLoc").textContent = geoLoc;
            document.getElementById("lblWeather").textContent = geoWeather;
        }

        // Toggles Bluetooth connection links safely across systems
        async function toggleConnection() {
            if (connectedTargetDevice) {
                disconnectDevice();
                return;
            }

            try {
                connectionState.textContent = "SCANNING...";
                pingDot.className = "w-3 h-3 bg-yellow-500 rounded-full border border-black animate-pulse";

                // Platform specific execution wrapper
                if (window.Capacitor && typeof BleClient !== 'undefined') {
                    // Mobile Capacitor BLE Device Picker loop
                    connectedTargetDevice = await BleClient.requestDevice({
                        services: [TARGET_SERVICE_UUID]
                    });
                    
                    await BleClient.connect(connectedTargetDevice.deviceId, (id) => {
                        console.log(`[LINK]: Disconnect callback captured for ID: ${id}`);
                        disconnectDevice();
                    });

                    console.log("[LINK]: Hardware RF connected. Processing secure validation handshake.");
                    await runSecureAuthenticationHandshake(connectedTargetDevice.deviceId);
                } else {
                    // Fallback desktop Chrome Web-Bluetooth engine
                    const webDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ services: [TARGET_SERVICE_UUID] }]
                    });
                    const server = await webDevice.gatt.connect();
                    connectedTargetDevice = { deviceId: webDevice.id, gattServer: server };
                    
                    webDevice.addEventListener('gattserverdisconnected', disconnectDevice);
                    console.log("[LINK]: Web Bluetooth connected. Processing secure validation handshake.");
                    await runSecureAuthenticationHandshake(null);
                }

            } catch (error) {
                console.error("Link Connection Error Exception:", error);
                disconnectDevice();
            }
        }

        // Secure automated passcode transmission sequence handler
        async function runSecureAuthenticationHandshake(nativeDeviceId) {
            connectionState.textContent = "VERIFYING LINK...";
            
            // Allow 400ms background thread cooling period before writing initial handshakes
            setTimeout(async () => {
                const handshakePacket = `AUTH:${SECURITY_PASSCODE}|M_Buddy_Mobile_Client`;
                const success = await writeRawPayload(nativeDeviceId, handshakePacket);
                
                if (success) {
                    console.log("[HANDSHAKE]: Pin string array pushed successfully into air channels.");
                    
                    // Mark system active and execute synchronization loops 
                    setTimeout(() => {
                        connectionState.textContent = "ONLINE & SYNCED";
                        pingDot.className = "w-3 h-3 bg-green-500 rounded-full border border-black";
                        connectBtn.textContent = "DISCONNECT";
                        connectBtn.className = "bg-red-600 text-white font-bold px-4 py-2 rounded border border-black hover:bg-black transition-all";
                        
                        startDashboardTelemetryPushes(nativeDeviceId);
                    }, 1000);
                } else {
                    disconnectDevice();
                }
            }, 400);
        }

        // High frequency execution loop wrapper to handle background telemetry syncing 
        function startDashboardTelemetryPushes(nativeDeviceId) {
            if (transmissionIntervalTimer) clearInterval(transmissionIntervalTimer);
            
            // Sync environment data block dynamically once every 3.5 seconds
            transmissionIntervalTimer = setInterval(async () => {
                if (!connectedTargetDevice) return;
                const dashPacket = `DASH:${geoTime}|${geoLoc}|${geoWeather}|${currentCustomTextPayload}`;
                await writeRawPayload(nativeDeviceId, dashPacket);
            }, 3500);
        }

        // Direct command button trigger processor
        async function triggerMood(emotionKey) {
            if (!connectedTargetDevice) {
                alert("Please connect your M-Buddy device hardware first.");
                return;
            }
            const deviceId = (window.Capacitor && connectedTargetDevice) ? connectedTargetDevice.deviceId : null;
            await writeRawPayload(deviceId, `CMD:${emotionKey}`);
        }

        // Custom keyboard character layout message pipeline extractor 
        function pushCustomText() {
            const rawField = document.getElementById("txtCustom").value.trim();
            if (rawField.length === 0) {
                currentCustomTextPayload = "None";
            } else {
                // Strips profile separation pipes from user string payload to prevent parsing crashes
                currentCustomTextPayload = rawField.replace(/\|/g, "-");
            }
            console.log(`[STORAGE]: Custom notification matrix segment altered to: "${currentCustomTextPayload}"`);
            
            // Force immediate transmission flash update out to display
            if (connectedTargetDevice) {
                const deviceId = window.Capacitor ? connectedTargetDevice.deviceId : null;
                const quickDashPacket = `DASH:${geoTime}|${geoLoc}|${geoWeather}|${currentCustomTextPayload}`;
                writeRawPayload(deviceId, quickDashPacket);
            }
        }

        // Core transmission compilation layer engine converting characters into low level array buffers
        async function writeRawPayload(capacitorId, payloadString) {
            try {
                // Force an explicit line termination character into array so input buffers evaluate immediately
                const targetedString = payloadString + "\n";
                
                // Safe standard byte array conversion profile matrix setup
                const byteEncoder = new TextEncoder();
                const rawBytesArray = byteEncoder.encode(targetedString);
                
                if (window.Capacitor && typeof BleClient !== 'undefined') {
                    // Direct Capacitor low level platform binary push profile 
                    await BleClient.write(
                        capacitorId,
                        TARGET_SERVICE_UUID,
                        TARGET_CHAR_UUID,
                        new DataView(rawBytesArray.buffer)
                    );
                } else if (connectedTargetDevice && connectedTargetDevice.gattServer) {
                    // Core Web GATT system profile runner
                    const primaryService = await connectedTargetDevice.gattServer.getPrimaryService(TARGET_SERVICE_UUID);
                    const rxCharacteristic = await primaryService.getCharacteristic(TARGET_CHAR_UUID);
                    await rxCharacteristic.writeValue(rawBytesArray);
                }
                return true;
            } catch (ex) {
                console.error("[TX FAILURE]: Critical execution array drop error context:", ex);
                return false;
            }
        }

        // Clean link release system profile manager
        function disconnectDevice() {
            try {
                if (transmissionIntervalTimer) clearInterval(transmissionIntervalTimer);
                
                if (window.Capacitor && typeof BleClient !== 'undefined' && connectedTargetDevice) {
                    BleClient.disconnect(connectedTargetDevice.deviceId);
                } else if (connectedTargetDevice && connectedTargetDevice.gattServer) {
                    connectedTargetDevice.gattServer.disconnect();
                }
            } catch (err) {
                console.warn("Graceful cleanup wrapper note:", err);
            } finally {
                connectedTargetDevice = null;
                transmissionIntervalTimer = null;
                
                connectionState.textContent = "DISCONNECTED";
                pingDot.className = "w-3 h-3 bg-red-500 rounded-full border border-black";
                connectBtn.textContent = "CONNECT";
                connectBtn.className = "bg-[#00ffcc] text-black font-bold px-4 py-2 rounded border border-black hover:bg-black hover:text-[#00ffcc] transition-all duration-200";
                console.log("[LINK]: Hardware interface channels cleanly rolled back to dormant state.");
            }
        }
    </script>
</body>
</html>
