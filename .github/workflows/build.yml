name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/bluetooth-le
          npx cap init M-Buddy mochi.buddy.app --web-dir=www

      - name: Recreate Clean Native Architecture
        run: |
          rm -rf android
          npx cap add android

      - name: Inject Android Bluetooth Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Use a block of clean text to safely append hardware flags to the manifest
          cat << 'EOF' > permissions.xml
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          </manifest>
          EOF
          
          # Swap out the standard closing tag with the permissions block
          sed -i 's|</manifest>||g' "$MANIFEST_PATH"
          cat permissions.xml >> "$MANIFEST_PATH"
          echo "Hardware permissions embedded safely."

      - name: Sync Production Assets & Plugins
        run: npx cap sync android

      - name: Build Standalone APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: M-Buddy-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
