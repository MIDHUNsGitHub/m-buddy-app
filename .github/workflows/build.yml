name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor Packages Freshly
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init M-Buddy mochi.buddy.app --web-dir=www

      - name: Remove Local Conflicting Android Scaffolding
        run: rm -rf android

      - name: Create Fresh Android Workspace
        run: npx cap add android

      - name: Sync Web Assets
        run: npx cap sync android

      - name: Build Standalone APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: M-Buddy-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
