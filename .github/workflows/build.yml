name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Forces the app bundle to explicitly package the bluetooth plugin
      - name: Install Project Dependencies
        run: |
          npm install
          npm install @capacitor/android@6.0.0 @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor-community/bluetooth-le@6.0.0

      - name: Recreate Clean Native Architecture
        run: |
          rm -rf android
          npx cap add android

      - name: Inject Baseline Android Build Values
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml
          
          cat << 'EOF' > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.9.0'
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.13.1'
              androidxFragmentVersion = '1.7.1'
              coreSplashScreenVersion = '1.0.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.1.5'
              androidxEspressoCoreVersion = '3.5.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

         
          cat << 'EOF' > android/app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">M-Buddy</string>
              <string name="title_activity_main">M-Buddy</string>
              <string name="custom_url_scheme">mochi.buddy.app</string>
          </resources>
          EOF

          cat << 'EOF' > android/app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="."/>
          </paths>
          EOF

      # SYSTEM-LEVEL SECURITY FIX: Declares the BLE hardware requirement and allows network bypass flags
      - name: Inject Secure Android Hardware Permissions Natively
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <uses-feature android:name="android.hardware.bluetooth_le" android:required="true"/>
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />
              
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="mochi.buddy.app.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"></meta-data>
                  </provider>
              </application>
          </manifest>
          EOF

      - name: Force Register BluetoothLE Plugin in Android Lifecycle
        run: |
          mkdir -p android/app/src/main/java/mochi/buddy/app
          cat << 'EOF' > android/app/src/main/java/mochi/buddy/app/MainActivity.java
          package mochi.buddy.app;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(com.getcapacitor.community.bluetoothle.BluetoothLePlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF
          
      - name: Auto-Compile Custom Branding Launcher Icons
        run: |
          npm install @capacitor/assets --save-dev
          if [ -d "assets" ] && [ -f "assets/logo.png" ]; then
            npx capacitor-assets generate --android --iconBackgroundColor '#1b0a2a'
          else
            echo "Branding graphics skipped."
          fi

      # Forcing sync ensures the web dependencies map their bridging hooks cleanly to Java source structures
      - name: Sync Production Assets & Plugins
        run: |
          npx cap update android
          npx cap sync android

      - name: Build Standalone APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: M-Buddy-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
