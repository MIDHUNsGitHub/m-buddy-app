name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Autogenerate Clean Base package.json
        run: |
          cat << 'EOF' > package.json
          {
            "name": "m-buddy-companion-app",
            "version": "1.0.0",
            "description": "M-Buddy ESP32 Controller Wrapper",
            "main": "index.js",
            "scripts": {
              "build": "echo 'Static setup done.'"
            },
            "dependencies": {
              "@capacitor/android": "^6.0.0",
              "@capacitor/cli": "^6.0.0",
              "@capacitor/core": "^6.0.0",
              "@capacitor-community/bluetooth-le": "^6.0.0"
            }
          }
          EOF
          echo "Base package.json cleanly generated in root folder."

      - name: Install Project Dependencies
        run: |
          npm install
          npx cap init M-Buddy mochi.buddy.app --web-dir=www

      - name: Recreate Clean Native Architecture
        run: |
          rm -rf android
          npx cap add android

      - name: Sync Production Assets & Plugins
        run: npx cap sync android

      - name: Build Standalone APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: M-Buddy-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
