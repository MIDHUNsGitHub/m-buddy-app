<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Buddy Direct Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700;900&family=Rajdhani:wght=500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at center, #1b0a2a, #0c0414); }
    .futuristic-title { font-family: 'Orbitron', sans-serif; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-white min-h-screen p-4 flex flex-col justify-between relative">

  <div id="toastContainer" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm px-4 pointer-events-none transition-all duration-300 transform -translate-y-10 opacity-0">
    <div class="bg-purple-950/90 border border-purple-500/40 rounded-2xl p-4 shadow-xl backdrop-blur-xl flex items-center gap-3">
      <div id="toastIcon" class="w-8 h-8 rounded-full flex items-center justify-center bg-purple-500/20 text-purple-400 font-bold">✓</div>
      <div>
        <p id="toastTitle" class="font-bold text-sm futuristic-title text-purple-300">ALERT</p>
        <p id="toastMessage" class="text-xs text-gray-300 mt-0.5"></p>
      </div>
    </div>
  </div>

  <header class="text-center py-4 border-b border-purple-900/40">
    <h1 class="futuristic-title text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-fuchsia-500 to-indigo-400">M-BUDDY</h1>
    <p class="text-xs text-purple-400/80 tracking-widest uppercase mt-1">Direct Hardware Layer</p>
  </header>

  <main class="max-w-md mx-auto w-full flex-grow flex flex-col justify-center gap-6 py-6">
    <div class="bg-purple-950/20 border border-purple-500/20 rounded-3xl p-6 backdrop-blur-xl">
      <div class="flex items-center justify-between border-b border-purple-900/40 pb-4">
        <div>
          <span class="text-xs text-purple-400 uppercase tracking-widest">Link Status</span>
          <h2 id="connectionState" class="text-2xl font-bold text-gray-400 futuristic-title mt-1">DISCONNECTED</h2>
          <span id="runtimeEngine" class="text-[10px] text-purple-400/60 uppercase tracking-wider block mt-1">Detecting Engine...</span>
        </div>
        <div class="relative flex h-4 w-4">
          <span id="pingRing" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
          <span id="pingDot" class="relative inline-flex rounded-full h-4 w-4 bg-red-500"></span>
        </div>
      </div>

      <div class="mt-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <span class="text-[10px] text-gray-400 uppercase tracking-wider block mb-1">M-Buddy Suffix</span>
            <input type="text" id="mochiID" maxlength="4" placeholder="Any" class="w-full bg-purple-950/40 border border-purple-500/30 rounded-xl px-3 py-2 text-center futuristic-title font-bold text-white uppercase focus:outline-none">
          </div>
          <div>
            <span class="text-[10px] text-gray-400 uppercase tracking-wider block mb-1">Security PIN</span>
            <input type="password" id="mochiPIN" maxlength="4" placeholder="1234" class="w-full bg-purple-950/40 border border-purple-500/30 rounded-xl px-3 py-2 text-center futuristic-title font-bold text-white focus:outline-none">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-3 mt-6">
        <button id="connectBtn" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 rounded-2xl font-bold tracking-widest uppercase futuristic-title text-sm transition-all transform active:scale-95">
          Search & Connect
        </button>
      </div>
    </div>
  </main>

  <script>
    const SERVICE_UUID        = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let isCapacitorActive = false;

    const connectBtn = document.getElementById('connectBtn');
    const connectionState = document.getElementById('connectionState');
    const pingRing = document.getElementById('pingRing');
    const pingDot = document.getElementById('pingDot');
    const inputMochiID = document.getElementById('mochiID');
    const inputMochiPIN = document.getElementById('mochiPIN');
    const runtimeEngineText = document.getElementById('runtimeEngine');

    // Clean, direct Base64 encoding function safe for native Android platforms
    function cleanToBase64(str) {
      let result = '';
      for (let i = 0; i < str.length; i++) {
        result += String.fromCharCode(str.charCodeAt(i) & 0xff);
      }
      return btoa(result);
    }

    window.addEventListener('load', () => {
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BluetoothLe) {
        isCapacitorActive = true;
        runtimeEngineText.textContent = "Capacitor Native BLE System Ready";
        runtimeEngineText.className = "text-[10px] text-green-400 font-bold uppercase tracking-wider block mt-1";
      } else {
        isCapacitorActive = false;
        runtimeEngineText.textContent = "Web Engine Standby Mode";
      }
    });

    connectBtn.addEventListener('click', async () => {
      if (bluetoothDevice) { onDisconnected(); return; }
      
      if (isCapacitorActive) {
        handleCapacitorLink();
      } else {
        showToast("ERROR", "Please run this inside the Android application shell.", true);
      }
    });

    async function handleCapacitorLink() {
      const Ble = window.Capacitor.Plugins.BluetoothLe;
      const targetPin = inputMochiPIN.value.trim() || "1234";

      try {
        connectionState.textContent = "INITIALIZING...";
        await Ble.initialize();
        
        connectionState.textContent = "SCANNING...";
        const device = await Ble.requestDevice({ serviceUUIDs: [SERVICE_UUID] });

        if (!device || !device.deviceId) { onDisconnected(); return; }

        connectionState.textContent = "CONNECTING...";
        await Ble.connect({ deviceId: device.deviceId, timeout: 10000 });
        
        // Safety grace period for Android service mapping tables to finish indexing
        await new Promise(r => setTimeout(r, 600));

        connectionState.textContent = "AUTHENTICATING...";
        
        const payloadStr = `AUTH:${targetPin}`;
        const encodedValue = cleanToBase64(payloadStr);

        // Native Write Operation
        await Ble.write({
          deviceId: device.deviceId,
          service: SERVICE_UUID,
          characteristic: CHARACTERISTIC_UUID,
          value: encodedValue
        });

        bluetoothDevice = device;
        connectionState.textContent = (device.name || "M-BUDDY").toUpperCase();
        connectionState.className = "text-2xl font-bold futuristic-title mt-1 text-green-400";
        pingDot.className = "relative inline-flex rounded-full h-4 w-4 bg-green-500";
        pingRing.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75";
        connectBtn.textContent = "Disconnect Link";
        showToast("SUCCESS", "Directly linked over hardware channels.");

      } catch (err) {
        console.error("Safely captured native error:", err);
        showToast("LINK FAILURE", err.message || "Write request timed out.", true);
        onDisconnected();
      }
    }

    function onDisconnected() {
      bluetoothDevice = null;
      connectionState.textContent = "DISCONNECTED";
      connectionState.className = "text-gray-400 text-2xl font-bold futuristic-title mt-1";
      pingDot.className = "relative inline-flex rounded-full h-4 w-4 bg-red-500";
      pingRing.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75";
      connectBtn.textContent = "Search & Connect";
    }

    function showToast(title, message, isError = false) {
      const container = document.getElementById('toastContainer');
      document.getElementById('toastTitle').textContent = title;
      document.getElementById('toastMessage').textContent = message;
      container.classList.remove('opacity-0', '-translate-y-10');
      container.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        container.classList.remove('opacity-100', 'translate-y-0');
        container.classList.add('opacity-0', '-translate-y-10');
      }, 3500);
    }
  </script>
</body>
</html>
